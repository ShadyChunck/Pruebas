<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <h1>Agregar Empleado/Usuario</h1>
        <form id="agregar_empleado_form">
            <input type="text" id="name" placeholder="Nombre" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <select name="tipo" id="tipo" required>
                <option value="" selected>Tipo de Cuenta</option>
                <option value="Empleado">Empleado</option>
                <option value="Administrador">Administrador</option>
            </select>
            <button type="submit">Agregar Usuario</button>
        </form>
        <br>
        <p>Esta página está hecha para agregar empleados de manera rápida y no hacerlo manualmente cada vez.</p>
        <p>Por el momento, tendremos esto como prueba nadamás, o no se como lo vean ustedes</p>

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { onAuthStateChanged, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { addDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        document.getElementById("agregar_empleado_form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const tipo = document.getElementById("tipo").value;

            try {

                const emailToCheck = email;

                fetchSignInMethodsForEmail(auth, emailToCheck)
                .then((signInMethods) => {
                    if (signInMethods && signInMethods.length > 0) {
                    console.log(`El correo ${emailToCheck} ya registrado.`);
                    } else {
                    console.log(`El correo ${emailToCheck} no está registrado.`);
                    }
                })
                .catch((error) => {
                    console.error("Error al verificar el correo:", error);
                });


                const credenciales = await createUserWithEmailAndPassword(auth, email, password);
                const user = credenciales.user;

                const usuario = {
                    uid: user.uid,
                    name: name,
                    email: email,
                    tipo: tipo
                };

                await addDoc(collection(db, "usuarios"), usuario);

                alert(`Registrado como: Usuario ${name}, Tipo: ${tipo}`);
            } catch (error) {
                console.error("Error al agregar usuario:", error);
                alert("Hubo un error al agregar el usuario. Por favor, intenta nuevamente.");
            }
        });


    </script>

</body>
</html>
