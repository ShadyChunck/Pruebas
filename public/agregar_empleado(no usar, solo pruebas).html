<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/agregar_empleado.css">
    <title>Agregar Empleado</title>
</head>
<body>
        <h1>Agregar Empleado/Usuario</h1>
        <div class  >
        <form id="agregar_empleado_form">
            <input type="text" id="name" placeholder="Nombre" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <select name="tipo" id="tipo" required>
                <option value="" selected>Tipo de Cuenta</option>
                <option value="Empleado">Empleado</option>
                <option value="Administrador">Administrador</option>
            </select>
            <button type="submit">Agregar Usuario</button>
        </form>
        <br>
        <p>Esta página está hecha para agregar empleados de manera rápida y no hacerlo manualmente cada vez.</p>
        <p>Por el momento, tendremos esto como prueba nadamás, o no se como lo vean ustedes</p>

</body>
</html>
