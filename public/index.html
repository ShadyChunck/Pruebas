<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos</title>
  <link rel="stylesheet" href="css/base.css">
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>Autopartes</h1>
        <h1><span>Hessman</span></h1>
        <p>Gestión de Inventario</p>
      </div>
      <nav id="secciones">
        <p class="nav-label">Inventario</p>
        <a id="nav-inventario" class="nav-item" href="index.html">Productos</a>
        <a id="nav-nuevo-producto" class="nav-item" href="panel_nuevo_producto.html">Nuevo Producto</a>
        <p class="nav-label">Ventas</p>
        <a id="nav-nueva-venta" class="nav-item" href="panel_nueva_venta.html">Registro de Ventas</a>
        <a id="nav-ventas" class="nav-item" href="panel_ventas.html">Historial de Ventas</a>
      </nav>
      <div class="sidebar-perfil">
        <div class="avatar" id="perfil_avatar"></div>
        <div class="perfil-info">
          <p id="perfil_nombre"></p>
          <span id="perfil_correo"></span>
        </div>
      </div>
    </aside>

    <div class="main-wrap">
      <header>
        <div class="h-left">
          <h2>Productos</h2>
        </div>
        <div class="h-right">
          <button class="btn" id="cerrar_sesion">Cerrar Sesión</button>
        </div>
      </header>

      <main>
        <div class="search-bar">
          <input type="search" placeholder="Buscar por nombre">
          <a href="panel_nuevo_producto.html" class="btn btn-p">Agregar Producto</a>
        </div>

        <div class="card">
          <div class="card-title">Productos registrados <small id="conteoProductos"></small></div>
          <div class="t-wrap">
            <table>
              <!-- Titulos -->
              <thead>
                <tr>
                  <th>Imagen</th>
                  <th>ID</th>
                  <th>Producto</th>
                  <th>Descripción</th>
                  <th>Marca</th>
                  <th>Categoría</th>
                  <th>Precio</th>
                  <th>Stock</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <!-- Contenido en filas -->
              <tbody id="tabla_productos">
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="popup-overlay" id="popup">
    <div class="popup">
        <div class="popup-titulo" id="popup-titulo"></div>
        <div class="popup-cuerpo" id="popup-cuerpo"></div>
        <div class="popup-acciones" id="popup-acciones"></div>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script type="module" src="js/popup.js"></script>
  <script type="module" src="js/productos.js"></script>
  <script type="module" src="js/nuevo_producto.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
