<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Ventas</title>
  <link rel="stylesheet" href="css/base.css">
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>Autopartes</h1>
        <h1><span>Hessman</span></h1>
        <p>Gestión de Inventario</p>
      </div>
      <nav id="secciones">
        <p class="nav-label">Inventario</p>
        <a id="nav-inventario" class="nav-item" href="index.html">Productos</a>
        <a id="nav-nuevo-producto" class="nav-item" href="panel_nuevo_producto.html">Nuevo Producto</a>
        <p class="nav-label">Ventas</p>
        <a id="nav-nueva-venta" class="nav-item" href="panel_nueva_venta.html">Registro de Ventas</a>
        <a id="nav-ventas" class="nav-item" href="panel_ventas.html">Historial de Ventas</a>
      </nav>
      <div class="sidebar-perfil">
        <div class="avatar" id="perfil_avatar"></div>
        <div class="perfil-info">
          <p id="perfil_nombre"></p>
          <span id="perfil_correo"></span>
        </div>
      </div>
    </aside>

    <div class="main-wrap">
      <header>
        <div class="h-left">
          <h2>Historial de Ventas</h2>
          <span>Ventas > Historial</span>
        </div>
        <div class="h-right">
          <a href="panel_nueva_venta.html" class="btn btn-p">+ Nueva Venta</a>
          <button class="btn" id="cerrar_sesion">Cerrar Sesión</button>
        </div>
      </header>

      <main>
        <!-- Tabla de ventas -->
        <div class="card">
          <div class="card-title">Historial de Ventas <!-- small>Últimos 30 días</!--></div>
          <div class="t-wrap">
            <table>
              <thead>
                <tr>
                  <th># de Venta</th>
                  <th>Fecha</th>
                  <th>Cliente</th>
                  <th>Productos</th>
                  <th>Subtotal</th>
                  <th>Total</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaVentas">
                
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="popup-overlay" id="popup">
    <div class="popup">
        <div class="popup-titulo" id="popup-titulo"></div>
        <div class="popup-cuerpo" id="popup-cuerpo"></div>
        <div class="popup-acciones" id="popup-acciones"></div>
    </div>
  </div>

  <script src="js/sidebar.js"></script>
  <script type="module" src="js/popup.js"></script>
  <script type="module" src="js/ventas.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>

</html>
