<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header id="barra_hessman">
        <!-- Falta la imagen/logo aquí -->
        <p>Autopartes Hessman</p>
    </header>

    <div class="login-container">
        
        <div class="login-card">
            <div class="login-header">
                <h2>Restaurar Contraseña</h2>
                <p>Ingrese su correo electrónico para enviar un correo de reinicio de contraseña.</p>
            </div>

            <form id="inicio_sesion" class="login-form" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input autocomplete="on" type="email" id="email" name="email" placeholder="Correo Electrónico" required>
                        <span class="error-message" id="emailError"></span>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Enviar Correo</span>
                    <span class="btn-loader"></span>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="js/restaurar_contraseña.js"></script>
</body>
</html>
